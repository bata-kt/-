<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Бағалау Транспортирі</title>
    <style>
        :root { --bg-dark: #05060f; --bg-panel: rgba(20, 22, 45, 0.8); --neon-cyan: #00f2ff; --neon-pink: #ff00ff; --neon-green: #39ff14; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #login-screen { text-align: center; background: var(--bg-panel); padding: 50px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); width: 380px; }
        input { background: rgba(0, 0, 0, 0.5); border: 1px solid var(--neon-cyan); padding: 15px; color: white; border-radius: 12px; width: 100%; margin-bottom: 20px; }
        .btn-start { background: var(--neon-cyan); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; }
        #main-dashboard { display: none; width: 95%; max-width: 1100px; gap: 25px; justify-content: center; }
        .left-side { flex: 2; background: var(--bg-panel); border-radius: 30px; padding: 40px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .protractor { position: relative; width: 450px; height: 225px; margin: 50px auto 20px; }
        .node { position: absolute; width: 46px; height: 46px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid; background: rgba(0,0,0,0.6); z-index: 10; transition: 0.3s; }
        .node.disabled { opacity: 0.2; pointer-events: none; }
        .node.selected { transform: scale(1.3); box-shadow: 0 0 30px currentColor; }
        .right-side { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .stat-card { background: var(--bg-panel); padding: 30px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .avg-val { font-size: 4.5rem; font-weight: 900; color: var(--neon-green); }
        .student-list { background: var(--bg-panel); border-radius: 25px; padding: 15px; height: 350px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--neon-cyan);">КІРУ</h2>
        <input type="text" id="stu-name" placeholder="Атыңызды жазыңыз...">
        <button class="btn-start" onclick="login()">КІРУ</button>
    </div>

    <div id="main-dashboard">
        <div class="left-side">
            <div id="user-display" style="font-size: 1.5rem; font-weight: 900; color: var(--neon-pink);">NAME</div>
            <div class="protractor" id="protractor"></div>
        </div>
        <div class="right-side">
            <div class="stat-card">
                <div style="font-size: 0.7rem;">ОРТАША БАЛЛ</div>
                <div id="avg-display" class="avg-val">0.0</div>
            </div>
            <div class="student-list" id="log-list"></div>
            <button onclick="clearData()" style="color:red; background:transparent; border:1px solid red; padding:10px; cursor:pointer;">ТІЗІМДІ ТАЗАРТУ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhDoUp5pY8EioJikcuEQUAvJskDQGr-e0",
            authDomain: "kkkkk-9a989.firebaseapp.com",
            projectId: "kkkkk-9a989",
            storageBucket: "kkkkk-9a989.firebasestorage.app",
            messagingSenderId: "722084953530",
            appId: "1:722084953530:web:9b10b7a9a4c289c9297183",
            measurementId: "G-G90JL62V9L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://kkkkk-9a989-default-rtdb.firebaseio.com/");
        const colors = { 1:'#f44', 2:'#f44', 3:'#f44', 4:'#fb0', 5:'#fb0', 6:'#fb0', 7:'#0ff', 8:'#0ff', 9:'#3f1', 10:'#3f1' };

        window.login = () => {
            const name = document.getElementById('stu-name').value;
            if(!name) return alert("Атыңызды жазыңыз!");
            document.getElementById('user-display').innerText = name.toUpperCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            renderNodes();
        };

        function renderNodes() {
            const container = document.getElementById('protractor');
            for (let i = 1; i <= 10; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.innerText = i;
                node.style.left = (225 + 205 * Math.cos((180 + i * 18 - 9) * Math.PI / 180) - 23) + 'px';
                node.style.top = (225 + 205 * Math.sin((180 + i * 18 - 9) * Math.PI / 180) - 23) + 'px';
                node.style.borderColor = colors[i];
                node.style.color = colors[i];
                node.onclick = () => {
                    push(ref(db, 'votes'), { name: document.getElementById('user-display').innerText, val: i, color: colors[i] });
                    document.querySelectorAll('.node').forEach(n => n.classList.add('disabled'));
                    node.classList.add('selected');
                };
                container.appendChild(node);
            }
        }

        onValue(ref(db, 'votes'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('log-list');
            list.innerHTML = "";
            let sum = 0, count = 0;
            if(data) {
                Object.values(data).reverse().forEach(v => {
                    sum += v.val; count++;
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-left:4px solid ${v.color}">${v.name} <b>${v.val}</b></div>`;
                });
            }
            document.getElementById('avg-display').innerText = count > 0 ? (sum / count).toFixed(1) : "0.0";
        });

        window.clearData = () => { if(confirm("Тазарту?")) set(ref(db, 'votes'), null); };
    </script>
</body>
</html>
