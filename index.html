<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Бағалау Транспортирі — Realtime</title>
    <style>
        body { background: #05060f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #main-dashboard { display: none; width: 95%; max-width: 1100px; gap: 25px; }
        .node { position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 2px solid; display: flex; justify-content: center; align-items: center; cursor: pointer; background: black; }
        .node.disabled { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <input type="text" id="stu-name" placeholder="Атыңыз...">
        <button onclick="login()">КІРУ</button>
    </div>

    <div id="main-dashboard">
        <div class="left-side">
            <div id="user-display"></div>
            <div id="protractor" style="position: relative; width: 450px; height: 225px;"></div>
        </div>
        <div class="right-side">
            <div id="avg-display" style="font-size: 3rem;">0.0</div>
            <div id="log-list"></div>
            <button onclick="clearData()" style="color:red;">БАРЛЫҒЫН ТАЗАРТУ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // Өз параметрлеріңізді осы жерге қойыңыз:
        const firebaseConfig = {
            apiKey: "AIzaSyDhDoUp5pY8EioJikcuEQUAvJskDQGr-e0",
            authDomain: "kkkkk-9a989.firebaseapp.com",
            projectId: "kkkkk-9a989",
            storageBucket: "kkkkk-9a989.firebasestorage.app",
            messagingSenderId: "722084953530",
            appId: "1:722084953530:web:9b10b7a9a4c289c9297183",
            measurementId: "G-G90JL62V9L"
        };

        const app = initializeApp(firebaseConfig);
        // База сілтемесін осы жерге қосамыз:
        const db = getDatabase(app, "https://kkkkk-9a989-default-rtdb.firebaseio.com/");
        const colors = { 1:'#f44', 2:'#f44', 3:'#f44', 4:'#fb0', 5:'#fb0', 6:'#fb0', 7:'#0ff', 8:'#0ff', 9:'#3f1', 10:'#3f1' };

        window.login = () => {
            const name = document.getElementById('stu-name').value;
            if(!name) return alert("Атыңызды жазыңыз!");
            document.getElementById('user-display').innerText = name.toUpperCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            renderNodes();
        };

        function renderNodes() {
            const container = document.getElementById('protractor');
            for (let i = 1; i <= 10; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.innerText = i;
                node.style.left = (225 + 205 * Math.cos((180 + i * 18 - 9) * Math.PI / 180) - 23) + 'px';
                node.style.top = (225 + 205 * Math.sin((180 + i * 18 - 9) * Math.PI / 180) - 23) + 'px';
                node.style.borderColor = colors[i];
                node.onclick = () => {
                    push(ref(db, 'votes'), { name: document.getElementById('user-display').innerText, val: i, color: colors[i] });
                    document.querySelectorAll('.node').forEach(n => n.classList.add('disabled'));
                };
                container.appendChild(node);
            }
        }

        onValue(ref(db, 'votes'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('log-list');
            list.innerHTML = "";
            let sum = 0, count = 0;
            if(data) {
                Object.values(data).reverse().forEach(v => {
                    sum += v.val; count++;
                    list.innerHTML += `<div style="padding:10px; border-left:4px solid ${v.color}">${v.name}: ${v.val}</div>`;
                });
            }
            document.getElementById('avg-display').innerText = count > 0 ? (sum / count).toFixed(1) : "0.0";
        });

        window.clearData = () => { if(confirm("Тазарту?")) set(ref(db, 'votes'), null); };
    </script>
</body>
</html>
